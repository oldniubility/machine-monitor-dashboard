version: "3.8"

services:
  backend:
    build: ./backend
    container_name: mmd-backend
    ports:
      - "8000:8000"
    environment:
      - MMD_DATABASE_URL=sqlite+aiosqlite:///./machine_monitor.db
    volumes:
      - data:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: mmd-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  data:
